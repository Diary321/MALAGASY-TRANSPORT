<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Accueil Client - MALAGASY TRANSPORT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        /* Image de fond */
        body {
            background-image: url('img.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        /* Overlay sombre */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* En-tête avec effet glassmorphism */
        .header-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .header-glass h2 {
            font-weight: 700;
            color: #1a5276;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.05);
        }

        .header-glass p {
            color: #2c3e50;
            font-weight: 500;
        }

        /* Cartes des voyages */
        .card-voyage {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            overflow: hidden;
            height: 100%;
        }

        .card-voyage:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 0.97);
        }

        .card-voyage .card-body {
            padding: 25px;
        }

        .card-voyage .card-title {
            color: #1a5276;
            font-weight: 700;
            font-size: 1.2rem;
            border-bottom: 3px solid #28a745;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .card-voyage .card-text {
            color: #2c3e50;
        }

        .card-voyage .card-text strong {
            color: #1a5276;
        }

        /* Icônes dans les cartes */
        .icon-destination {
            color: #28a745;
            margin-right: 8px;
        }

        .badge-prix {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 600;
        }

        /* Bouton "Choisir" */
        .btn-choose {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-choose:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
            color: white;
        }

        /* Boutons header */
        .btn-header {
            border-radius: 50px;
            padding: 8px 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-header:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
        }

        .btn-histoire {
            background: linear-gradient(135deg, #17a2b8, #0dcaf0);
            border: none;
            color: white;
        }

        .btn-histoire:hover {
            color: white;
            transform: translateY(-2px);
        }

        /* NOUVEAU BOUTON MESSAGES */
        .btn-messages {
            background: linear-gradient(135deg, #ffc107, #fd7e14);
            border: none;
            color: white;
        }

        .btn-messages:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 193, 7, 0.4);
        }

        .btn-deconnexion {
            background: rgba(108, 117, 125, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(5px);
        }

        .btn-deconnexion:hover {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        /* Badge de notification */
        .badge-notif {
            background: #dc3545;
            color: white;
            border-radius: 50px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        /* Message "aucun voyage" */
        .msg-empty {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            border: 2px dashed #6c757d;
        }

        .msg-empty i {
            font-size: 3rem;
            color: #6c757d;
            margin-bottom: 15px;
        }

        /* Animation des cartes */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-voyage {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .card-voyage:nth-child(2) {
            animation-delay: 0.1s;
        }

        .card-voyage:nth-child(3) {
            animation-delay: 0.2s;
        }

        .card-voyage:nth-child(4) {
            animation-delay: 0.3s;
        }

        .card-voyage:nth-child(5) {
            animation-delay: 0.4s;
        }

        .card-voyage:nth-child(6) {
            animation-delay: 0.5s;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .header-glass {
                padding: 15px 20px;
            }

            .header-glass h2 {
                font-size: 1.5rem;
            }

            .header-glass .d-flex {
                flex-direction: column;
                gap: 10px;
            }

            .btn-header {
                width: 100%;
                text-align: center;
            }

            .card-voyage .card-body {
                padding: 18px;
            }
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <!-- En-tête avec effet glassmorphism -->
        <div class="header-glass">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <div>
                    <h2><i class="fas fa-home text-primary me-2"></i>Accueil</h2>
                    <p class="mb-0"><i class="fas fa-bus text-success me-2"></i>Choisissez votre voyage et réservez
                        votre siège.</p>
                </div>
                <div class="d-flex gap-2 mt-2 mt-sm-0 flex-wrap">
                    <a href="historique.html" class="btn btn-histoire btn-header">
                        <i class="fas fa-history me-1"></i>Historique
                    </a>
                    <!-- NOUVEAU BOUTON MESSAGES -->
                    <a href="messages.html" class="btn btn-messages btn-header">
                        <i class="fas fa-envelope me-1"></i>Messages
                        <span id="clientUnreadBadge" class="badge-notif" style="display:none;">0</span>
                    </a>
                    <button id="logoutBtn" class="btn btn-deconnexion btn-header">
                        <i class="fas fa-sign-out-alt me-1"></i>Se déconnecter
                    </button>
                </div>
            </div>
        </div>

        <!-- Conteneur des voyages -->
        <div id="voyagesRow" class="row gy-4"></div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        // Charger les messages non lus pour le badge
        async function loadUnreadCount() {
            try {
                const response = await fetch(API.client.messages(user.id));
                if (!response.ok) return;
                const messages = await response.json();
                const unread = messages.filter(m => m.statut === 'non_lu').length;
                const badge = document.getElementById('clientUnreadBadge');
                if (unread > 0) {
                    badge.style.display = 'inline';
                    badge.textContent = unread;
                } else {
                    badge.style.display = 'none';
                }
            } catch (error) {
                console.error('Erreur chargement messages:', error);
            }
        }

        async function loadVoyages() {
            try {
                const response = await fetch(API.client.accueil);
                if (!response.ok) {
                    return document.getElementById('voyagesRow').innerHTML = `
                        <div class="col-12">
                            <div class="msg-empty">
                                <i class="fas fa-exclamation-circle text-danger"></i>
                                <p class="text-danger">Impossible de charger les voyages.</p>
                            </div>
                        </div>
                    `;
                }
                const voyages = await response.json();
                const row = document.getElementById('voyagesRow');
                row.innerHTML = '';

                if (voyages.length === 0) {
                    row.innerHTML = `
                        <div class="col-12">
                            <div class="msg-empty">
                                <i class="fas fa-bus"></i>
                                <p class="text-muted mb-0">Aucun voyage disponible pour le moment.</p>
                                <p class="text-muted small">Revenez plus tard !</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                voyages.forEach((voyage, index) => {
                    const col = document.createElement('div');
                    col.className = 'col-md-4 col-lg-3';
                    col.innerHTML = `
                        <div class="card-voyage" style="animation-delay: ${index * 0.1}s">
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">
                                    <i class="fas fa-map-marker-alt icon-destination"></i>
                                    ${voyage.destination}
                                </h5>
                                <p class="card-text mb-2">
                                    <i class="fas fa-calendar-alt text-success me-2"></i>
                                    <strong>Date :</strong> ${voyage.date}
                                </p>
                                <p class="card-text mb-2">
                                    <i class="fas fa-clock text-success me-2"></i>
                                    <strong>Heure :</strong> ${voyage.heure}
                                </p>
                                <p class="card-text mb-3">
                                    <i class="fas fa-tag text-success me-2"></i>
                                    <strong>Prix :</strong> 
                                    <span class="badge-prix">${voyage.prix} MGA</span>
                                </p>
                                <button class="btn btn-choose mt-auto" onclick='selectVoyage(${JSON.stringify(voyage)})'>
                                    <i class="fas fa-check-circle me-2"></i>Choisir ce voyage
                                </button>
                            </div>
                        </div>
                    `;
                    row.appendChild(col);
                });
            } catch (error) {
                document.getElementById('voyagesRow').innerHTML = `
                    <div class="col-12">
                        <div class="msg-empty">
                            <i class="fas fa-wifi text-danger"></i>
                            <p class="text-danger">Erreur de connexion au serveur.</p>
                            <p class="text-muted small">Vérifiez que le serveur est lancé.</p>
                        </div>
                    </div>
                `;
                console.error(error);
            }
        }

        function selectVoyage(voyage) {
            localStorage.setItem('selectedVoyage', JSON.stringify(voyage));
            window.location.href = 'selection.html';
        }

        // Charger les données au démarrage
        loadVoyages();
        loadUnreadCount();

        // Rafraîchir les messages toutes les 30 secondes
        setInterval(loadUnreadCount, 30000);
    </script>
</body>

</html>
