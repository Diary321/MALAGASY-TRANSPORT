<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Sélection des sièges</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        /* Image de fond */
        body {
            background-image: url('img2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        /* Overlay sombre */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* En-tête avec effet glassmorphism */
        .header-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .header-glass h2 {
            font-weight: 700;
            color: #1a5276;
        }

        .header-glass h2 i {
            color: #28a745;
        }

        /* Carte des infos voyage */
        .card-voyage {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 25px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .card-voyage:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .card-voyage .card-title {
            color: #1a5276;
            font-weight: 700;
            font-size: 1.4rem;
            border-bottom: 3px solid #28a745;
            padding-bottom: 12px;
            margin-bottom: 15px;
        }

        .card-voyage .info-item {
            padding: 8px 0;
            font-size: 1.05rem;
        }

        .card-voyage .info-item i {
            color: #28a745;
            width: 25px;
        }

        .card-voyage .info-item strong {
            color: #1a5276;
        }

        /* Conteneur des sièges */
        .seats-container {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 30px;
        }

        .seats-container h4 {
            color: #1a5276;
            font-weight: 600;
            border-bottom: 2px dashed #dee2e6;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .seats-container h4 i {
            color: #28a745;
        }

        /* Bus layout */
        .bus-layout {
            position: relative;
            padding: 20px 0;
        }

        .bus-layout::before {
            content: '🚌';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
        }

        /* Boutons des sièges */
        .btn-seat {
            border-radius: 12px;
            padding: 18px 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border: 2px solid #28a745;
            background: rgba(255, 255, 255, 0.7);
            color: #28a745;
            position: relative;
            width: 100%;
            min-height: 65px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-seat i {
            font-size: 1.2rem;
            margin-bottom: 3px;
        }

        .btn-seat:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.3);
            background: rgba(40, 167, 69, 0.1);
        }

        .btn-seat.selected {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border-color: #28a745;
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(40, 167, 69, 0.4);
        }

        .btn-seat.selected i {
            color: white;
        }

        .btn-seat:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #e9ecef;
            border-color: #ced4da;
            color: #6c757d;
        }

        .btn-seat .seat-number {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        .btn-seat.selected .seat-number {
            color: rgba(255, 255, 255, 0.8);
        }

        /* Bouton confirmer */
        .btn-confirm {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            color: white;
            padding: 14px 50px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .btn-confirm:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 35px rgba(40, 167, 69, 0.4);
            color: white;
        }

        .btn-confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #6c757d;
        }

        .btn-confirm i {
            margin-right: 10px;
        }

        /* Légende */
        .legend {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #2c3e50;
        }

        .legend-item .color-box {
            width: 25px;
            height: 25px;
            border-radius: 8px;
            border: 2px solid #dee2e6;
        }

        .legend-item .color-box.available {
            background: rgba(40, 167, 69, 0.2);
            border-color: #28a745;
        }

        .legend-item .color-box.selected {
            background: linear-gradient(135deg, #28a745, #20c997);
            border-color: #28a745;
        }

        /* Bouton déconnexion */
        .btn-deconnexion {
            background: rgba(108, 117, 125, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 8px 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-deconnexion:hover {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-glass {
            animation: fadeInUp 0.5s ease-out;
        }

        .card-voyage {
            animation: fadeInUp 0.6s ease-out;
        }

        .seats-container {
            animation: fadeInUp 0.7s ease-out;
        }

        .btn-seat {
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
        }

        .btn-seat:nth-child(1) {
            animation-delay: 0.1s;
        }

        .btn-seat:nth-child(2) {
            animation-delay: 0.15s;
        }

        .btn-seat:nth-child(3) {
            animation-delay: 0.2s;
        }

        .btn-seat:nth-child(4) {
            animation-delay: 0.25s;
        }

        .btn-seat:nth-child(5) {
            animation-delay: 0.3s;
        }

        .btn-seat:nth-child(6) {
            animation-delay: 0.35s;
        }

        .btn-seat:nth-child(7) {
            animation-delay: 0.4s;
        }

        .btn-seat:nth-child(8) {
            animation-delay: 0.45s;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-glass {
                padding: 15px 20px;
            }

            .header-glass .d-flex {
                flex-direction: column;
                gap: 10px;
            }

            .header-glass h2 {
                font-size: 1.3rem;
            }

            .card-voyage {
                padding: 18px;
            }

            .card-voyage .card-title {
                font-size: 1.1rem;
            }

            .seats-container {
                padding: 18px;
            }

            .btn-seat {
                padding: 12px 8px;
                min-height: 55px;
                font-size: 0.8rem;
            }

            .btn-seat i {
                font-size: 1rem;
            }

            .btn-confirm {
                padding: 12px 30px;
                font-size: 1rem;
                width: 100%;
            }

            .legend {
                gap: 15px;
            }

            .legend-item {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 576px) {
            .btn-seat {
                padding: 10px 5px;
                min-height: 45px;
                font-size: 0.7rem;
            }

            .btn-seat i {
                font-size: 0.9rem;
            }

            .seats-container h4 {
                font-size: 1rem;
            }

            .card-voyage .info-item {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <!-- En-tête avec effet glassmorphism -->
        <div class="header-glass">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <h2 class="mb-0">
                    <i class="fas fa-chair me-2"></i>Choisissez votre siège
                </h2>
                <button id="logoutBtn" class="btn btn-deconnexion">
                    <i class="fas fa-sign-out-alt me-2"></i>Se déconnecter
                </button>
            </div>
        </div>

        <!-- Informations du voyage -->
        <div id="voyageInfo" class="card-voyage"></div>

        <!-- Sélection des sièges -->
        <div class="seats-container">
            <h4 class="text-center">
                <i class="fas fa-bus me-2"></i>Plan du bus
            </h4>
            <div class="bus-layout">
                <div class="row g-3" id="seatsRow"></div>
            </div>

            <!-- Légende -->
            <div class="legend">
                <span class="legend-item">
                    <span class="color-box available"></span>
                    Disponible
                </span>
                <span class="legend-item">
                    <span class="color-box selected"></span>
                    Sélectionné
                </span>
                <span class="legend-item">
                    <i class="fas fa-user-check text-success"></i>
                    Cliquez pour choisir
                </span>
            </div>
        </div>

        <!-- Bouton confirmer -->
        <div class="text-center mt-4">
            <button id="confirmBtn" class="btn btn-confirm" disabled>
                <i class="fas fa-check-circle"></i>Confirmer la réservation
            </button>
        </div>
    </div>

    <script>
        const seats = ['A1', 'A2', 'A3', 'A4', 'B1', 'B2', 'B3', 'B4'];
        let selectedSeat = null;

        const logoutBtn = document.getElementById('logoutBtn');
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            localStorage.removeItem('selectedVoyage');
            window.location.href = 'login.html';
        });

        const user = JSON.parse(localStorage.getItem('user'));
        const voyage = JSON.parse(localStorage.getItem('selectedVoyage'));

        if (!user || !voyage) {
            window.location.href = 'login.html';
        }

        // Afficher les informations du voyage
        document.getElementById('voyageInfo').innerHTML = `
            <h5 class="card-title">
                <i class="fas fa-map-marker-alt text-success me-2"></i>${voyage.destination}
            </h5>
            <div class="row">
                <div class="col-md-4">
                    <div class="info-item">
                        <i class="fas fa-calendar-alt"></i>
                        <strong>Date :</strong> ${voyage.date}
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="info-item">
                        <i class="fas fa-clock"></i>
                        <strong>Heure :</strong> ${voyage.heure}
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="info-item">
                        <i class="fas fa-tag"></i>
                        <strong>Prix :</strong> 
                        <span class="badge" style="background:linear-gradient(135deg,#28a745,#20c997);color:white;padding:5px 15px;border-radius:50px;">
                            ${voyage.prix} MGA
                        </span>
                    </div>
                </div>
            </div>
        `;

        // Créer les boutons des sièges
        const seatsRow = document.getElementById('seatsRow');
        seats.forEach((seat, index) => {
            const col = document.createElement('div');
            col.className = 'col-3 col-md-3 col-sm-3';
            const button = document.createElement('button');
            button.className = 'btn-seat';
            button.style.animationDelay = `${index * 0.05}s`;
            button.innerHTML = `
                <i class="fas fa-chair"></i>
                ${seat}
                <span class="seat-number">siège</span>
            `;
            button.setAttribute('data-seat', seat);

            button.addEventListener('click', () => {
                // Désélectionner tous les sièges
                document.querySelectorAll('.btn-seat').forEach(btn => btn.classList.remove('selected'));
                // Sélectionner le siège cliqué
                button.classList.add('selected');
                selectedSeat = seat;
                document.getElementById('confirmBtn').disabled = false;
                document.getElementById('confirmBtn').innerHTML = `
                    <i class="fas fa-check-circle"></i>Confirmer le siège ${seat}
                `;
            });

            col.appendChild(button);
            seatsRow.appendChild(col);
        });

        // Confirmer la réservation
        document.getElementById('confirmBtn').addEventListener('click', async () => {
            if (!selectedSeat) return;

            try {
                const response = await fetch(API.client.selection, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id_user: user.id,
                        id_voyage: voyage.id,
                        siege: selectedSeat
                    })
                });

                if (!response.ok) {
                    const text = await response.text();
                    return alert(text || 'Erreur de réservation');
                }

                const data = await response.json();
                localStorage.setItem('reservationId', data.reservationId);
                window.location.href = 'confirmation.html';
            } catch (error) {
                alert('Erreur de connexion au serveur.');
                console.error(error);
            }
        });
    </script>
</body>

</html>
