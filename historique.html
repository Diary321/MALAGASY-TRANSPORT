<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Historique des Réservations</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        /* Image de fond */
        body {
            background-image: url('img1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        /* Overlay sombre */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* En-tête avec effet glassmorphism */
        .header-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .header-glass h2 {
            font-weight: 700;
            color: #1a5276;
        }

        .header-glass h2 i {
            color: #17a2b8;
        }

        /* Carte principale avec effet glassmorphism */
        .card-glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 25px;
            overflow: hidden;
        }

        /* Tableau stylisé */
        .table-custom {
            margin-bottom: 0;
        }

        .table-custom thead {
            background: linear-gradient(135deg, #1a5276, #2e86c1);
            color: white;
        }

        .table-custom thead th {
            padding: 15px 12px;
            font-weight: 600;
            border: none;
            text-align: center;
        }

        .table-custom tbody td {
            padding: 14px 12px;
            vertical-align: middle;
            text-align: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            color: #2c3e50;
        }

        .table-custom tbody tr {
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.7);
        }

        .table-custom tbody tr:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: scale(1.01);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .table-custom tbody tr:last-child td {
            border-bottom: none;
        }

        /* Badges de statut */
        .badge-statut {
            padding: 8px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .badge-confirme {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .badge-attente {
            background: linear-gradient(135deg, #ffc107, #fd7e14);
            color: white;
        }

        .badge-annule {
            background: linear-gradient(135deg, #dc3545, #e74c3c);
            color: white;
        }

        /* Boutons */
        .btn-glass {
            border-radius: 50px;
            padding: 10px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-glass:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .btn-retour {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            color: white;
        }

        .btn-retour:hover {
            color: white;
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }

        .btn-deconnexion {
            background: rgba(108, 117, 125, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(5px);
        }

        .btn-deconnexion:hover {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        /* Message "aucune réservation" */
        .msg-empty {
            padding: 60px 20px;
            text-align: center;
        }

        .msg-empty i {
            font-size: 4rem;
            color: #17a2b8;
            margin-bottom: 20px;
        }

        .msg-empty h4 {
            color: #1a5276;
            font-weight: 600;
        }

        .msg-empty p {
            color: #6c757d;
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-glass {
            animation: fadeInUp 0.6s ease-out;
        }

        .table-custom tbody tr {
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
        }

        .table-custom tbody tr:nth-child(1) {
            animation-delay: 0.1s;
        }

        .table-custom tbody tr:nth-child(2) {
            animation-delay: 0.2s;
        }

        .table-custom tbody tr:nth-child(3) {
            animation-delay: 0.3s;
        }

        .table-custom tbody tr:nth-child(4) {
            animation-delay: 0.4s;
        }

        .table-custom tbody tr:nth-child(5) {
            animation-delay: 0.5s;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-glass {
                padding: 15px 20px;
            }

            .header-glass .d-flex {
                flex-direction: column;
                gap: 10px;
            }

            .header-glass h2 {
                font-size: 1.3rem;
            }

            .table-custom thead th,
            .table-custom tbody td {
                padding: 10px 8px;
                font-size: 0.85rem;
            }

            .btn-glass {
                padding: 8px 20px;
                font-size: 0.9rem;
                width: 100%;
            }

            .card-glass {
                padding: 15px;
            }

            .badge-statut {
                padding: 5px 12px;
                font-size: 0.75rem;
            }
        }

        @media (max-width: 576px) {

            .table-custom thead th,
            .table-custom tbody td {
                padding: 8px 5px;
                font-size: 0.75rem;
            }

            .header-glass h2 {
                font-size: 1.1rem;
            }

            .header-glass h2 i {
                font-size: 1.2rem;
            }

            .msg-empty i {
                font-size: 3rem;
            }

            .msg-empty h4 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <!-- En-tête avec effet glassmorphism -->
        <div class="header-glass">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <h2 class="mb-0">
                    <i class="fas fa-history me-2"></i>Historique des Réservations
                </h2>
                <button id="logoutBtn" class="btn btn-deconnexion btn-glass">
                    <i class="fas fa-sign-out-alt me-2"></i>Se déconnecter
                </button>
            </div>
        </div>

        <!-- Carte principale -->
        <div class="card-glass">
            <!-- Bouton retour -->
            <div class="mb-4">
                <a href="accueil.html" class="btn btn-retour btn-glass">
                    <i class="fas fa-arrow-left me-2"></i>Retour à l'accueil
                </a>
            </div>

            <!-- Tableau des réservations -->
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th><i class="fas fa-map-marker-alt me-1"></i>Destination</th>
                            <th><i class="fas fa-calendar-alt me-1"></i>Date</th>
                            <th><i class="fas fa-clock me-1"></i>Heure</th>
                            <th><i class="fas fa-chair me-1"></i>Siège</th>
                            <th><i class="fas fa-info-circle me-1"></i>Statut</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        <!-- Les réservations seront chargées ici -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const logoutBtn = document.getElementById('logoutBtn');
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        async function loadHistory() {
            try {
                const response = await fetch(API.client.historique(user.id));
                if (!response.ok) throw new Error('Erreur chargement');
                const reservations = await response.json();
                const body = document.getElementById('historyBody');
                body.innerHTML = '';

                if (reservations.length === 0) {
                    body.innerHTML = `
                        <tr>
                            <td colspan="5">
                                <div class="msg-empty">
                                    <i class="fas fa-ticket-alt"></i>
                                    <h4>Aucune réservation</h4>
                                    <p>Vous n'avez pas encore effectué de réservation.</p>
                                    <a href="accueil.html" class="btn btn-retour btn-glass mt-2">
                                        <i class="fas fa-bus me-2"></i>Réserver maintenant
                                    </a>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                reservations.forEach((res, index) => {
                    const row = document.createElement('tr');
                    // Déterminer la classe du badge selon le statut
                    let badgeClass = 'badge-attente';
                    if (res.statut === 'confirmé' || res.statut === 'confirmée') {
                        badgeClass = 'badge-confirme';
                    } else if (res.statut === 'annulé' || res.statut === 'annulée') {
                        badgeClass = 'badge-annule';
                    }

                    row.innerHTML = `
                        <td><i class="fas fa-bus text-success me-2"></i>${res.destination}</td>
                        <td>${res.date}</td>
                        <td>${res.heure}</td>
                        <td><span class="badge bg-secondary">${res.siege}</span></td>
                        <td><span class="badge-statut ${badgeClass}">${res.statut}</span></td>
                    `;
                    // Appliquer le délai d'animation
                    row.style.animationDelay = `${index * 0.1}s`;
                    body.appendChild(row);
                });
            } catch (error) {
                document.getElementById('historyBody').innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="msg-empty">
                                <i class="fas fa-exclamation-triangle text-danger"></i>
                                <h4 class="text-danger">Erreur de chargement</h4>
                                <p>Impossible de charger l'historique des réservations.</p>
                                <p class="text-muted small">Vérifiez que le serveur est lancé.</p>
                            </div>
                        </td>
                    </tr>
                `;
                console.error(error);
            }
        }

        loadHistory();
    </script>
</body>

</html>
