<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }

        .header-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            text-align: center;
            height: 100%;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .stat-card .label {
            color: #6c757d;
            font-weight: 500;
            margin-top: 5px;
        }

        .stat-card .icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .stat-card.pending .icon {
            color: #ffc107;
        }

        .stat-card.users .icon {
            color: #17a2b8;
        }

        .stat-card.reservations .icon {
            color: #28a745;
        }

        .stat-card.pending .number {
            color: #ffc107;
        }

        .stat-card.users .number {
            color: #17a2b8;
        }

        .stat-card.reservations .number {
            color: #28a745;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 25px;
            margin-top: 30px;
        }

        .table-custom thead {
            background: linear-gradient(135deg, #dc3545, #e74c3c);
            color: white;
        }

        .table-custom thead th {
            padding: 12px 15px;
            font-weight: 600;
            border: none;
            text-align: center;
        }

        .table-custom tbody td {
            padding: 12px 15px;
            vertical-align: middle;
            text-align: center;
        }

        .badge-statut {
            padding: 6px 15px;
            border-radius: 50px;
            font-weight: 600;
        }

        .badge-attente {
            background: #ffc107;
            color: #212529;
        }

        .badge-confirme {
            background: #28a745;
            color: white;
        }

        .badge-annule {
            background: #dc3545;
            color: white;
        }

        .btn-confirm {
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-confirm:hover {
            background: #1e7e34;
            color: white;
            transform: scale(1.05);
        }

        .btn-cancel {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            background: #bd2130;
            color: white;
            transform: scale(1.05);
        }

        .btn-deconnexion {
            background: #6c757d;
            border: none;
            color: white;
            padding: 8px 25px;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .btn-deconnexion:hover {
            background: #dc3545;
            color: white;
        }

        /* NOUVEAU BOUTON MESSAGES */
        .btn-messages-admin {
            background: linear-gradient(135deg, #ffc107, #fd7e14);
            border: none;
            color: white;
            border-radius: 50px;
            padding: 8px 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-messages-admin:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 193, 7, 0.4);
        }

        /* Badge de notification */
        .badge-notif {
            background: #dc3545;
            color: white;
            border-radius: 50px;
            padding: 2px 8px;
            font-size: 0.7rem;
            margin-left: 5px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        @media (max-width: 768px) {
            .stat-card .number {
                font-size: 1.8rem;
            }

            .header-glass .d-flex {
                flex-direction: column;
                gap: 15px;
            }

            .header-glass .d-flex .d-flex {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }

            .btn-messages-admin,
            .btn-deconnexion,
            #refreshBtn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- En-tête -->
        <div class="header-glass">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <h2 class="text-danger mb-0">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard Admin
                </h2>
                <div class="d-flex gap-2 mt-2 mt-md-0 flex-wrap">
                    <!-- NOUVEAU BOUTON MESSAGES -->
                    <a href="admin-messages.html" class="btn-messages-admin">
                        <i class="fas fa-envelope me-1"></i>Messages
                        <span id="adminUnreadBadge" class="badge-notif" style="display:none;">0</span>
                    </a>
                    <button id="refreshBtn" class="btn btn-info" style="border-radius:50px; padding:8px 25px;">
                        <i class="fas fa-sync-alt"></i> Rafraîchir
                    </button>
                    <button id="logoutBtn" class="btn btn-deconnexion">
                        <i class="fas fa-sign-out-alt me-2"></i>Se déconnecter
                    </button>
                </div>
            </div>
        </div>

        <!-- Statistiques -->
        <div class="row g-4">
            <div class="col-md-4">
                <div class="stat-card users">
                    <div class="icon"><i class="fas fa-users"></i></div>
                    <div class="number" id="usersCount">0</div>
                    <div class="label">Utilisateurs</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card pending">
                    <div class="icon"><i class="fas fa-clock"></i></div>
                    <div class="number" id="pendingCount">0</div>
                    <div class="label">En attente</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card reservations">
                    <div class="icon"><i class="fas fa-ticket-alt"></i></div>
                    <div class="number" id="reservationsCount">0</div>
                    <div class="label">Total réservations</div>
                </div>
            </div>
        </div>

        <!-- Gestion des réservations -->
        <div class="card-glass">
            <h4 class="mb-3">
                <i class="fas fa-tasks text-primary me-2"></i>Gestion des réservations
            </h4>
            <div class="table-responsive">
                <table class="table table-custom">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Client</th>
                            <th>Destination</th>
                            <th>Date</th>
                            <th>Siège</th>
                            <th>Statut</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reservationsBody">
                        <tr>
                            <td colspan="7" class="text-center">Chargement des réservations...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Gestion des voyages -->
        <div class="text-center mt-4">
            <a href="gestion.html" class="btn btn-primary btn-lg" style="border-radius:50px; padding:12px 40px;">
                <i class="fas fa-bus me-2"></i>Gestion des voyages
            </a>
        </div>
    </div>

    <script>
        const admin = JSON.parse(localStorage.getItem('admin'));
        if (!admin || admin.role !== 'admin') {
            window.location.href = 'admin-login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('admin');
            window.location.href = 'admin-login.html';
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            loadDashboard();
            loadReservations();
        });

        async function loadDashboard() {
            try {
                const response = await fetch(API.admin.dashboard);
                if (!response.ok) return;
                const data = await response.json();
                document.getElementById('usersCount').textContent = data.users || 0;
                document.getElementById('pendingCount').textContent = data.pending || 0;
                document.getElementById('reservationsCount').textContent = data.reservations || 0;

                // Afficher le badge des messages non lus
                const unreadBadge = document.getElementById('adminUnreadBadge');
                if (data.unread > 0) {
                    unreadBadge.style.display = 'inline';
                    unreadBadge.textContent = data.unread;
                } else {
                    unreadBadge.style.display = 'none';
                }
            } catch (error) {
                console.error('Erreur dashboard:', error);
            }
        }

        async function loadReservations() {
            try {
                const response = await fetch(`${API.admin.dashboard.replace('/dashboard', '')}/reservations`);
                if (!response.ok) throw new Error('Erreur chargement');
                const reservations = await response.json();
                const body = document.getElementById('reservationsBody');
                body.innerHTML = '';

                if (reservations.length === 0) {
                    body.innerHTML = '<tr><td colspan="7" class="text-center text-muted">Aucune réservation</td></tr>';
                    return;
                }

                reservations.forEach(res => {
                    const row = document.createElement('tr');

                    let badgeClass = 'badge-attente';
                    let statusText = res.statut;
                    if (res.statut === 'confirmé') {
                        badgeClass = 'badge-confirme';
                    } else if (res.statut === 'annulé') {
                        badgeClass = 'badge-annule';
                    }

                    let actions = '';
                    if (res.statut === 'en attente') {
                        actions = `
                            <button class="btn-confirm me-1" onclick="confirmReservation(${res.id})">
                                <i class="fas fa-check"></i>
                            </button>
                            <button class="btn-cancel" onclick="cancelReservation(${res.id})">
                                <i class="fas fa-times"></i>
                            </button>
                        `;
                    } else {
                        actions = `<span class="text-muted">-</span>`;
                    }

                    row.innerHTML = `
                        <td>#${res.id}</td>
                        <td>${res.client_nom}<br><small class="text-muted">${res.client_email}</small></td>
                        <td>${res.destination}</td>
                        <td>${res.date} ${res.heure}</td>
                        <td><span class="badge bg-secondary">${res.siege}</span></td>
                        <td><span class="badge-statut ${badgeClass}">${statusText}</span></td>
                        <td>${actions}</td>
                    `;
                    body.appendChild(row);
                });
            } catch (error) {
                document.getElementById('reservationsBody').innerHTML =
                    '<tr><td colspan="7" class="text-danger text-center">Erreur de chargement</td></tr>';
                console.error(error);
            }
        }

        async function confirmReservation(id) {
            if (!confirm('Confirmer cette réservation ?')) return;
            try {
                const response = await fetch(`${API.admin.dashboard.replace('/dashboard', '')}/reservations/confirm/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error('Erreur');
                alert('✅ Réservation confirmée !');
                loadDashboard();
                loadReservations();
            } catch (error) {
                alert('❌ Erreur lors de la confirmation');
                console.error(error);
            }
        }

        async function cancelReservation(id) {
            if (!confirm('Annuler cette réservation ?')) return;
            try {
                const response = await fetch(`${API.admin.dashboard.replace('/dashboard', '')}/reservations/cancel/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!response.ok) throw new Error('Erreur');
                alert('❌ Réservation annulée !');
                loadDashboard();
                loadReservations();
            } catch (error) {
                alert('❌ Erreur lors de l\'annulation');
                console.error(error);
            }
        }

        // Charger les données au démarrage
        loadDashboard();
        loadReservations();

        // Rafraîchir toutes les 30 secondes
        setInterval(() => {
            loadDashboard();
        }, 30000);
    </script>
</body>

</html>
