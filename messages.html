<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Mes Messages - MALAGASY TRANSPORT</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        body {
            background-image: url('img.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        .header-glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            padding: 25px;
            margin-bottom: 25px;
        }

        .btn-deconnexion {
            background: rgba(108, 117, 125, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 8px 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-deconnexion:hover {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .btn-send {
            background: linear-gradient(135deg, #17a2b8, #0dcaf0);
            border: none;
            color: white;
            padding: 10px 30px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-send:hover {
            transform: scale(1.05);
            color: white;
            box-shadow: 0 8px 25px rgba(23, 162, 184, 0.4);
        }

        .message-item {
            border-left: 4px solid #17a2b8;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .message-item:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateX(5px);
        }

        .message-item .sujet {
            font-weight: 700;
            color: #1a5276;
        }

        .message-item .date {
            font-size: 0.85rem;
            color: #6c757d;
        }

        .message-item .statut {
            font-size: 0.8rem;
            padding: 3px 12px;
            border-radius: 50px;
        }

        .statut-non_lu {
            background: #dc3545;
            color: white;
        }

        .statut-lu {
            background: #28a745;
            color: white;
        }

        .statut-repondu {
            background: #17a2b8;
            color: white;
        }

        .message-item .reponse {
            background: #e8f4f8;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 3px solid #17a2b8;
        }

        .badge-count {
            background: #dc3545;
            color: white;
            border-radius: 50px;
            padding: 2px 10px;
            font-size: 0.75rem;
            margin-left: 5px;
        }

        @media (max-width: 768px) {
            .header-glass .d-flex {
                flex-direction: column;
                gap: 10px;
            }

            .message-item {
                padding: 12px 15px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- En-tête -->
        <div class="header-glass">
            <div class="d-flex justify-content-between align-items-center flex-wrap">
                <h2 class="mb-0">
                    <i class="fas fa-envelope text-primary me-2"></i>Mes Messages
                </h2>
                <div class="d-flex gap-2">
                    <a href="accueil.html" class="btn btn-outline-primary" style="border-radius:50px;">
                        <i class="fas fa-arrow-left me-1"></i>Retour
                    </a>
                    <button id="logoutBtn" class="btn btn-deconnexion">
                        <i class="fas fa-sign-out-alt me-2"></i>Se déconnecter
                    </button>
                </div>
            </div>
        </div>

        <!-- Formulaire d'envoi -->
        <div class="card-glass">
            <h5 class="mb-3"><i class="fas fa-pen text-success me-2"></i>Envoyer un message à l'admin</h5>
            <form id="messageForm">
                <div class="mb-3">
                    <label class="form-label">Sujet</label>
                    <input type="text" class="form-control" id="sujet" placeholder="Sujet de votre message" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" id="message" rows="4" placeholder="Écrivez votre message..."
                        required></textarea>
                </div>
                <button type="submit" class="btn btn-send">
                    <i class="fas fa-paper-plane me-2"></i>Envoyer
                </button>
            </form>
        </div>

        <!-- Liste des messages -->
        <div class="card-glass">
            <h5 class="mb-3">
                <i class="fas fa-history text-primary me-2"></i>Historique des messages
            </h5>
            <div id="messagesList">
                <p class="text-muted text-center">Chargement des messages...</p>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        // Envoyer un message
        document.getElementById('messageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sujet = document.getElementById('sujet').value;
            const message = document.getElementById('message').value;

            try {
                const response = await fetch(API.client.sendMessage, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_user: user.id, sujet, message })
                });

                if (!response.ok) throw new Error('Erreur');

                alert('✅ Message envoyé avec succès !');
                document.getElementById('messageForm').reset();
                loadMessages();
            } catch (error) {
                alert('❌ Erreur lors de l\'envoi');
                console.error(error);
            }
        });

        // Charger les messages
        async function loadMessages() {
            try {
                const response = await fetch(API.client.messages(user.id));
                if (!response.ok) throw new Error('Erreur');
                const messages = await response.json();
                const container = document.getElementById('messagesList');

                if (messages.length === 0) {
                    container.innerHTML = `
                        <div class="text-center text-muted py-4">
                            <i class="fas fa-inbox fa-3x mb-3 d-block"></i>
                            <p>Aucun message pour le moment.</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = messages.map(msg => {
                    let statutClass = 'statut-non_lu';
                    let statutText = 'Non lu';
                    if (msg.statut === 'lu') { statutClass = 'statut-lu'; statutText = 'Lu'; }
                    else if (msg.statut === 'repondu') { statutClass = 'statut-repondu'; statutText = 'Répondu'; }

                    let reponseHtml = '';
                    if (msg.reponse) {
                        reponseHtml = `
                            <div class="reponse">
                                <strong><i class="fas fa-reply text-primary"></i> Réponse :</strong>
                                <p class="mb-0 mt-1">${msg.reponse}</p>
                            </div>
                        `;
                    }

                    return `
                        <div class="message-item">
                            <div class="d-flex justify-content-between align-items-start flex-wrap">
                                <div>
                                    <span class="sujet">${msg.sujet}</span>
                                    <span class="statut ${statutClass} ms-2">${statutText}</span>
                                </div>
                                <span class="date">${new Date(msg.date_envoi).toLocaleString('fr-FR')}</span>
                            </div>
                            <p class="mb-1 mt-2">${msg.message}</p>
                            ${reponseHtml}
                        </div>
                    `;
                }).join('');
            } catch (error) {
                document.getElementById('messagesList').innerHTML =
                    '<p class="text-danger text-center">Erreur de chargement des messages</p>';
                console.error(error);
            }
        }

        loadMessages();
    </script>
</body>

</html>
