<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Connexion Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="config.js"></script>
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center text-danger">Connexion Admin</h2>
        <form id="adminLoginForm" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="email" type="email" class="form-control" placeholder="Entrez votre email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input id="password" type="password" class="form-control" placeholder="Entrez votre mot de passe"
                    required>
            </div>
            <button type="submit" class="btn btn-danger w-100">Se connecter</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('adminLoginForm');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const mot_de_passe = document.getElementById('password').value;

            try {
                const response = await fetch(API.auth.login, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, mot_de_passe })
                });

                if (!response.ok) {
                    const text = await response.text();
                    return alert(text || 'Erreur de connexion');
                }

                const data = await response.json();
                if (data.user.role !== 'admin') {
                    return alert('Accès réservé aux administrateurs');
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('admin', JSON.stringify(data.user));
                window.location.href = 'dashboard.html';
            } catch (error) {
                alert('Erreur de connexion au serveur. Vérifiez que le serveur est lancé.');
                console.error(error);
            }
        });
    </script>
</body>

</html>
