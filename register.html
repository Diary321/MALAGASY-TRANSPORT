<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Inscription Client</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="config.js"></script>
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="text-center text-primary">Inscription Client</h2>
        <form id="registerForm" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Nom complet</label>
                <input id="nom" type="text" class="form-control" placeholder="Entrez votre nom" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input id="email" type="email" class="form-control" placeholder="Entrez votre email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input id="password" type="password" class="form-control" placeholder="Entrez votre mot de passe"
                    required>
            </div>
            <button type="submit" class="btn btn-success w-100">S'inscrire</button>
            <p class="mt-3 text-center">Déjà inscrit ? <a href="login.html">Se connecter</a></p>
        </form>
    </div>

    <script>
        const form = document.getElementById('registerForm');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            const nom = document.getElementById('nom').value;
            const email = document.getElementById('email').value;
            const mot_de_passe = document.getElementById('password').value;

            try {
                const response = await fetch(API.auth.register, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nom, email, mot_de_passe, role: 'client' })
                });

                if (!response.ok) {
                    const text = await response.text();
                    return alert(text || 'Erreur lors de l\'inscription');
                }

                alert('Inscription réussie ! Vous pouvez maintenant vous connecter.');
                window.location.href = 'login.html';
            } catch (error) {
                alert('Erreur de connexion au serveur. Vérifiez que le serveur est lancé.');
                console.error(error);
            }
        });
    </script>
</body>

</html>
